name: PyPI publish

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build
      - run: python -m build

      - name: Publish to PyPI
        id: pypi
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true

      - name: Warn about PyPI setup
        if: steps.pypi.outcome == 'failure'
        run: |
          echo "::warning::PyPI publish failed — this is expected for first release."
          echo "::warning::To fix: go to https://pypi.org/manage/account/publishing/"
          echo "::warning::and add a trusted publisher for this repository."
          echo ""
          echo "Alternative: set PYPI_API_TOKEN as a repository secret and uncomment"
          echo "the API token approach below."
