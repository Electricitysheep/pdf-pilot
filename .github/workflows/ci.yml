name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Download test fixtures
        run: |
          mkdir -p tests/fixtures
          cd tests/fixtures

          # Multi-column PDF
          curl -sL -o chelsea_pdta.pdf "https://raw.githubusercontent.com/jsvine/pdfplumber/stable/tests/pdfs/chelsea.pdf"

          # Table PDF
          curl -sL -o federal-register.pdf "https://raw.githubusercontent.com/jsvine/pdfplumber/stable/tests/pdfs/federal-register.pdf"

          # Scanned PDF (pdfplumber sample)
          curl -sL -o scanned.pdf "https://raw.githubusercontent.com/jsvine/pdfplumber/stable/tests/pdfs/congressional-record.pdf"

          # Academic paper
          curl -sL -o attention.pdf "https://arxiv.org/pdf/1706.03762"

          # Validate: all files should be > 1KB
          for f in *.pdf; do
            size=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
            if [ "$size" -lt 1024 ]; then
              echo "ERROR: $f is too small ($size bytes), download may have failed"
              exit 1
            fi
            echo "OK: $f ($size bytes)"
          done
        shell: bash

      - name: Run linter
        run: |
          pip install ruff
          ruff check pdf_pilot/ tests/

      - name: Run tests
        run: |
          pytest tests/test_detectors.py tests/test_router.py tests/test_engines.py::TestPyMuPDFEngine tests/test_quality.py -v --tb=short
        env:
          PYTHONPATH: .

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
