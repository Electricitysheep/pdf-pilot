name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Download test fixtures
        run: |
          mkdir -p tests/fixtures

          # Academic paper (arxiv always works)
          curl -sL -o tests/fixtures/attention.pdf "https://arxiv.org/pdf/1706.03762"

          # Generate simple test PDFs with pymupdf
          python3 tests/generate_fixtures.py 2>/dev/null || echo "Fixture generation failed, some tests will skip"

          ls -la tests/fixtures/
        shell: bash

      - name: Run linter and format check
        run: |
          uv run ruff check pdf_pilot/ tests/
          uv run ruff format --check pdf_pilot/ tests/

      - name: Run tests with coverage
        run: |
          uv run pytest tests/test_detectors.py tests/test_router.py tests/test_engines.py::TestPyMuPDFEngine tests/test_quality.py \
            -v --tb=short \
            --cov=pdf_pilot --cov-report=xml --cov-report=term-missing
        shell: bash
        env:
          PYTHONPATH: .

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
          verbose: true
