name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Download test fixtures
        run: |
          mkdir -p tests/fixtures
          # Multi-column PDF (from pdfplumber test suite)
          curl -sL -o tests/fixtures/chelsea_pdta.pdf "https://raw.githubusercontent.com/jsvine/pdfplumber/v7.2.3/tests/pdfs/chelsea.pdf"
          # Table PDF
          curl -sL -o tests/fixtures/federal-register.pdf "https://raw.githubusercontent.com/jsvine/pdfplumber/v7.2.3/tests/pdfs/federal-register.pdf"
          # Academic paper (Attention Is All You Need)
          curl -sL -o tests/fixtures/attention.pdf "https://arxiv.org/pdf/1706.03762"
          # Scanned PDF (W3C sample)
          curl -sL -o tests/fixtures/scanned.pdf "https://www.w3.org/WAI/WCAG21/Techniques/pdf/img/table-data复杂性.pdf"
        shell: bash

      - name: Run linter
        run: |
          pip install ruff
          ruff check pdf_pilot/ tests/

      - name: Run tests
        run: |
          pytest tests/test_detectors.py tests/test_router.py tests/test_engines.py::TestPyMuPDFEngine tests/test_quality.py -v --tb=short
        env:
          PYTHONPATH: .

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
